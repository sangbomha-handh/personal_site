            <h2>주요성과</h2>
            <h3>LG전자 (2007-2015)</h3>
            <p>고속카메라를 이용한 분석 방법론 세계 최초 개발. K-Means 군집화 기반 알고리즘 설계. 터치 정확도 83.5% → 96.1% 향상. LG전자 전 모델 양산 적용. 그룹사 최우수 프로젝트 선정.</p>
            <h3>포스페이스랩 (2022-2025)</h3>
            <p>해지방어 성공률 80%. 신규 중견 3개사 추가 유치. 창사 이래 첫 업세일 계약 달성. 사내 영업 프로세스 자체를 재설계.</p>
            <h3>마인드허브 (2025)</h3>
            <p>차별화 콘텐츠 전략 수립. 신규 IR Deck 전체 설계. 운영 시스템 안정화.</p>
            <h2>경력</h2>

                <li>2007 LG전자 — 선임연구원 (9년)</li>
            </ul>
            <h2>배경</h2>
